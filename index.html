    <link rel="stylesheet" as="style" crossorigin

    <!-- Import Map for React and Lucide -->

    <script>
        window.addEventListener('error', function (e) {
            document.body.innerHTML += '<div style="color:red; background:white; z-index:9999; position:absolute; top:0; left:0; padding:20px; word-break: break-all;">Error: ' + e.message + '</div>';
        });
        const originalConsoleError = console.error;
        console.error = function (...args) {
            const msg = args.map(a => typeof a === 'object' && a !== null && a.message ? a.message : a).join(' ');
            document.body.innerHTML += '<div style="color:red; background:white; z-index:9999; position:absolute; top:0; left:0; padding:20px; word-break: break-all;">Console Error: ' + msg + '</div>';
            originalConsoleError.apply(console, args);
        };
    </script>
    <!-- Babel Standalone CDN -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-black text-slate-200 font-sans selection:bg-violet-500/30">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import {
            ChevronDown, Menu, Cpu, Activity, Database, Network, Wifi, Layers, Settings, Server, Terminal
        } from 'lucide-react';

        // --- Custom CSS Animations ---
        const CustomStyles = () => (
            <style dangerouslySetInnerHTML={{
                __html: ` 
                @keyframes marquee { 0% { transform: translateX(0%); } 100% { transform: translateX(-50%); } } 
                .animate-marquee { display: flex; width: 200%; animation: marquee 20s linear infinite; } 
                @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } } 
                .animate-float { animation: float 4s ease-in-out infinite; } 
                @keyframes pulse-glow { 0%, 100% { opacity: 0.4; box-shadow: 0 0 20px rgba(139, 92, 246, 0.15); } 50% { opacity: 0.8; box-shadow: 0 0 40px rgba(139, 92, 246, 0.3); } } 
                .animate-pulse-glow { animation: pulse-glow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; } 
                @keyframes flowLine { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } } 
                .flow-line { background: linear-gradient(90deg, transparent, rgba(167, 139, 250, 0.6), transparent); background-size: 50% 100%; animation: flowLine 2s linear infinite; } `
            }} />
        );

        // --- Interactive Components ---

        // 스크롤 시 페이드인 & 슬라이드 업 효과 컴포넌트
        const FadeIn = ({ children, delay = 0, className = "" }) => {
            const [isVisible, setIsVisible] = useState(false);
            const domRef = useRef();

            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                            if (domRef.current) observer.unobserve(domRef.current);
                        }
                    });
                }, { rootMargin: '0px 0px -100px 0px' });

                if (domRef.current) observer.observe(domRef.current);
                return () => { if (domRef.current) observer.unobserve(domRef.current); };
            }, []);

            return (
                <div ref={domRef} className={`transition-all duration-1000 ease-out ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12'} ${className}`} style={{ transitionDelay: `${delay}ms` }}>
                    {children}
                </div>
            );
        };

        // 마우스 움직임에 반응하는 3D 틸트 카드
        const TiltCard = ({ children, className = "" }) => {
            const [rotate, setRotate] = useState({ x: 0, y: 0 });
            const cardRef = useRef(null);

            const onMouseMove = useCallback((e) => {
                if (!cardRef.current) return;
                const card = cardRef.current;
                const box = card.getBoundingClientRect();
                const x = e.clientX - box.left;
                const y = e.clientY - box.top;

                const centerX = box.width / 2;
                const centerY = box.height / 2;

                const rotateX = ((y - centerY) / centerY) * -10; // Max rotation 10deg
                const rotateY = ((x - centerX) / centerX) * 10;

                setRotate({ x: rotateX, y: rotateY });
            }, []);

            const onMouseLeave = useCallback(() => {
                setRotate({ x: 0, y: 0 });
            }, []);

            return (
                <div ref={cardRef} onMouseMove={onMouseMove} onMouseLeave={onMouseLeave} className={`transition-transform duration-200 ease-out will-change-transform ${className}`} style={{
                    transform: `perspective(1000px) rotateX(${rotate.x}deg) rotateY(${rotate.y}deg)`
                }}>
                    {children}
                </div>
            );
        };

        // 실시간 변동하는 이진수 텍스트 시뮬레이터
        const BinaryMatrix = () => {
            const [matrix, setMatrix] = useState([]);

            useEffect(() => {
                const generateRow = () => Array.from({ length: 4 }, () =>
                    Math.random().toString(2).slice(2, 10).padStart(8, '0')
                ).join(' ');

                setMatrix(Array(6).fill('').map(generateRow));

                const interval = setInterval(() => {
                    setMatrix(prev => {
                        const newMatrix = [...prev];
                        const randomRow = Math.floor(Math.random() * 6);
                        newMatrix[randomRow] = generateRow();
                        return newMatrix;
                    });
                }, 150);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="text-center group-hover:text-violet-400/70 transition-colors duration-700">
                    {matrix.slice(0, 3).map((row, i) => <div key={`t-${i}`}>{row}</div>)}
                    <span
                        className="text-white/90 drop-shadow-[0_0_8px_rgba(167,139,250,0.5)] text-sm md:text-base tracking-[0.2em] my-2 block relative animate-pulse">
                        [ REAL-TIME DB SYNC ]
                    </span>
                    {matrix.slice(3, 6).map((row, i) => <div key={`b-${i}`}>{row}</div>)}
                </div>
            );
        };

        // --- Shared Components ---
        const SectionSubtitle = ({ children, center = false }) => (
            <div className={`flex flex-col ${center ? 'items-center' : 'items-start'} mb-10 z-10 relative`}>

                    {children}

        // --- Layout Sections ---

        const TopGlow = () => (

                </div>

                </div>

        );

        const Navbar = () => {

            return (

                    <div className="max-w-7xl mx-auto px-6 grid grid-cols-3 items-center">

                        </div>
                        {/* Right - Contact */}
                        <div className="flex items-center justify-end">
                            <a href="#" className="group flex items-center gap-2 text-[11px] md:text-xs tracking-[0.2em] uppercase text-white/70 hover:text-white transition-colors duration-300 font-medium">
                                Contact
                                <span className="transform group-hover:translate-x-1 transition-transform duration-300 text-white/40 group-hover:text-white">→</span>
                            </a>
                        </div>
                    </div>
                </nav>
            );
        };

        const Hero = () => (
            <section className="relative w-full h-screen min-h-[750px] flex flex-col items-center justify-center z-10 overflow-hidden bg-black">
                {/* [사수의 조언] Spline 배경을 꽉 채우기 위해 iframe 크기를 조절했습니다. 
                    하단의 Spline 로고를 가리기 위해 height를 조금 더 키우고 마진을 줬습니다. */}
                <div className="absolute inset-0 z-0 overflow-hidden">
                    <iframe
                        src='https://my.spline.design/claritystream-CEcUUPxDy7HUPRD6ZBmiTPi2/'

                </div>

                {/* 2. 로고 레이어 (z-10) - iframe 위에 얹어지는 부분 */}
                <FadeIn delay={600} className="relative z-10 flex flex-col items-center -mt-20">
                    <img
                        src="asset/디에이씨테크-로고.jpg"
                        alt="DACTECH Logo"
                        className="w-48 md:w-80 h-auto object-contain drop-shadow-[0_0_35px_rgba(139,92,246,0.4)]"
                    />
                </FadeIn>

                {/* 하단 페이드 아웃 그라데이션: 다음 섹션과 자연스럽게 연결 */}
                <div className="absolute bottom-0 left-0 w-full h-40 bg-gradient-to-t from-black via-black/80 to-transparent z-0 pointer-events-none"></div>
            </section>
        );

        const LogoBar = () => {
            const logos = [
                { icon: Settings, name: "LabVIEW" },
                { icon: Database, name: "MS SQL" },
                { icon: Network, name: "IoT" },
                { icon: Activity, name: "DAQ" },
                { icon: Server, name: "SERVER" }
            ];

            return (
                <div className="py-10 z-10 relative overflow-hidden flex flex-col items-center gap-10">
                    <span className="text-[10px] md:text-xs text-slate-500 tracking-[0.25em] uppercase font-medium">Trusted by —</span>
                    <div
                        className="animate-marquee items-center justify-around opacity-50 hover:opacity-100 transition-opacity duration-500 cursor-default">
                        {/* Render logos twice for infinite scroll effect */}
                        {[...logos, ...logos].map((logo, idx) => {
                            const Icon = logo.icon;
                            return (
                                <div key={idx}
                                    className="flex items-center gap-2 px-8 grayscale hover:grayscale-0 transition-all duration-300 hover:scale-110 transform">
                                    <Icon size={20} className="text-violet-400/70" />
                                    <span className="text-white text-sm font-bold tracking-wider">{logo.name}</span>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const Quote = () => (
            <section className="py-32 px-4 z-10 relative flex flex-col items-center overflow-hidden">
                <div
                    className="absolute w-[500px] h-[500px] bg-violet-900/10 blur-[100px] rounded-full top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none">
                </div>
                <FadeIn>
                    <SectionSubtitle center={true}>VISION</SectionSubtitle>
                </FadeIn>
                <FadeIn delay={200}>
                    <SectionTitle>
                        데이터에 숨겨진 가치는<br />
                        완벽한 가시화와 제어를 통해서만<br />
                        <span className="text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-indigo-300">드러납니다.</span>
                    </SectionTitle>
                </FadeIn>
            </section>
        );

        // --- CORE SOLUTIONS Section (가로 스크롤 및 Sticky, 순차 등장 구현 영역) ---
        const Features = () => {
            const containerRef = useRef(null);
            const trackRef = useRef(null);
            const cardRefs = useRef([]);
            const cardOffsetsRef = useRef([]);

            // 스크롤 성능 최적화를 위해 requestAnimationFrame 및 직접 DOM 조작 방식 사용
            useEffect(() => {
                let animationFrameId;

                const updateOffsetsAndScroll = () => {
                    if (trackRef.current) {
                        // 정확한 카드 위치(offset)를 측정하기 위해 일시적으로 가로 스크롤(transform) 초기화
                        const oldTransform = trackRef.current.style.transform;
                        trackRef.current.style.transform = 'translate3d(0px, 0px, 0px)';

                        const trackRect = trackRef.current.getBoundingClientRect();
                        cardOffsetsRef.current = cardRefs.current.map(card => {
                            return card ? card.getBoundingClientRect().left - trackRect.left : 0;
                        });

                        // 측정 후 원래 스크롤 위치로 복구
                        trackRef.current.style.transform = oldTransform;
                    }
                    handleScroll();
                };

                const handleScroll = () => {
                    if (!containerRef.current || !trackRef.current) return;

                    const rect = containerRef.current.getBoundingClientRect();
                    const scrollRange = rect.height - window.innerHeight; // 스크롤 가능한 전체 길이
                    const scrolled = -rect.top;

                    let progress = 0;
                    if (scrolled >= 0 && scrolled <= scrollRange) { progress = scrolled / scrollRange; } else if (scrolled > scrollRange) {
                        progress = 1;
                    } else if (scrolled < 0) { progress = 0; }

                    // 화면 너비를 고려하여 가로 스크롤(트랙 이동) 거리 계산
                    const trackWidth = trackRef.current.scrollWidth;
                    // px-[10vw] 여백이 이미 있으므로 추가 여백 제거하여 딱 맞게 스크롤
                    const maxTranslate = Math.max(0, trackWidth - window.innerWidth);

                    const currentTranslate = progress * maxTranslate;
                    trackRef.current.style.transform = `translate3d(-${currentTranslate}px, 0, 0)`;

                    // 물리적 위치가 아닌 전체 스크롤 진행도(progress)에 비례하여 카드 순차 등장
                    const totalSegments = cardRefs.current.length > 1 ? cardRefs.current.length - 1 : 1;
                    const segmentSize = 1 / totalSegments;

                    cardRefs.current.forEach((card, i) => {
                        if (!card) return;

                        // 1번 카드는 예외적으로 항상 처음에 보이도록 고정
                        if (i === 0) {
                            card.style.opacity = 1;
                            card.style.transform = `translate3d(0, 0px, 0)`;
                            return;
                        }

                        // 스크롤 초반부(약 30~40% 구간)에 모든 카드가 순차적으로 빠르게 등장하도록 압축
                        // 등장 간격이 너무 길면 유저가 빈 화면을 보고 스크롤이 끝난 것으로 오해할 수 있음
                        const stagger = 0.12; // 각 카드 등장 간격 (12%)
                        const animDuration = 0.15; // 각 카드가 완전히 나타나는데 걸리는 시간 (15%)

                        const start = (i - 1) * stagger + 0.02; // 약간의 초기 딜레이
                        const end = start + animDuration;

                        let cardProgress = 0;
                        if (progress >= end) {
                            cardProgress = 1;
                        } else if (progress <= start) {
                            cardProgress = 0;
                        } else {
                            cardProgress = (progress - start) / animDuration;
                        }

                        // 부드러운 이징(Ease-Out) 적용
                        const easeOut = 1 - Math.pow(1 - cardProgress, 3);
                        const opacity = Math.max(0, Math.min(1, easeOut));
                        const y = 80 * (1 - opacity); // 아래에서 위로 부드럽게 떠오름

                        card.style.opacity = opacity;
                        card.style.transform = `translate3d(0, ${y}px, 0)`;
                    });
                };

                const onScroll = () => {
                    animationFrameId = requestAnimationFrame(handleScroll);
                };

                // DOM 렌더링 후 오프셋 정확히 계산하기 위해 setTimeout 활용
                setTimeout(updateOffsetsAndScroll, 100);
                window.addEventListener('scroll', onScroll, { passive: true });
                window.addEventListener('resize', updateOffsetsAndScroll);

                return () => {
                    window.removeEventListener('scroll', onScroll);
                    window.removeEventListener('resize', updateOffsetsAndScroll);
                    cancelAnimationFrame(animationFrameId);
                };
            }, []);

            const cards = [
                {
                    num: "01",
                    title: "공정데이터관리",
                    desc: "PLC, 센서 등 제조 현장의 모든 데이터를 실시간으로 수집하고 MS SQL 기반으로 자산화하여 무결성을 보장합니다.",
                    graphic: (
                        <div
                            className="w-full h-40 relative z-10 flex items-end justify-center font-mono text-[8px] md:text-[10px] text-violet-500/30 leading-none overflow-hidden select-none pb-4">
                            <BinaryMatrix />
                        </div>
                    )
                },
                {
                    num: "02",
                    title: "부품성능시험기",
                    desc: "고정밀 센서를 통한 효율 분석 및 자동 연속 시험 (길들이기, 동/정특성) 지원으로 워크플로우를 최적화합니다.",
                    graphic: (
                        <div className="w-full h-40 relative z-10 flex items-end justify-center pb-4">
                            <div className="flex flex-col gap-3 w-full items-center">
                                {['길들이기 시험', '압력유량특성'].map((item, i) => (
                                    <div key={i} className="flex items-center gap-4 w-full justify-center group/item">
                                        <div className="h-[1px] w-12 bg-violet-500/20 overflow-hidden">
                                            <div className="w-full h-full flow-line" style={{ animationDelay: `${i * 0.5}s` }}></div>
                                        </div>
                                        <div
                                            className="px-5 py-2 border border-violet-500/20 rounded-full text-xs text-violet-300/80 bg-transparent whitespace-nowrap group-hover/item:border-violet-400 group-hover/item:text-white transition-all cursor-default min-w-[120px] text-center">
                                            {item}
                                        </div>
                                        <div className="h-[1px] w-12 bg-violet-500/20 overflow-hidden">
                                            <div className="w-full h-full flow-line" style={{ animationDelay: `${i * 0.5}s` }}></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )
                },
                {
                    num: "03",
                    title: "무선 IoT 어댑터",
                    desc: "기존 유선식 센서를 무선으로 전환하여, 초당 100 샘플의 데이터를 모바일과 웹에서 간편하게 측정합니다.",
                    graphic: (
                        <div className="w-full h-40 relative z-10 flex items-end justify-center pb-8">
                            <div
                                className="relative flex items-center justify-center group-hover:scale-110 transition-transform duration-500">
                                <div className="absolute w-24 h-24 bg-violet-500/10 rounded-full animate-pulse-glow"></div>
                                <Wifi size={32} className="text-violet-400/80 relative z-10" />
                                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-16 h-16 border border-violet-500/20 rounded-full animate-ping opacity-20"
                                    style={{ animationDuration: '3s' }}></div>
                                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-24 h-24 border border-violet-500/10 rounded-full animate-ping opacity-20"
                                    style={{ animationDuration: '3s', animationDelay: '1.5s' }}></div>
                            </div>
                        </div>
                    )
                },
                {
